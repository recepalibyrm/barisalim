<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bir şey soracağım 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeaf3);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* başlangıç */

.start h1{
font-family:'Great Vibes';
font-size:50px;
color:#d63384;
padding:20px;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
}

#yes{
background:#28a745;
color:white;
}

#no{
background:#dc3545;
color:white;
position:absolute;
}

.container{
display:none;
}

.container h2{
font-family:'Great Vibes';
font-size:50px;
color:#d63384;
padding:20px;
}

/* foto kart */

.photo{
position:absolute;
width:130px;
background:white;
padding:6px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
animation:story 6s linear;
}

.photo img{
width:100%;
border-radius:5px;
}

.caption{
font-size:11px;
}

@keyframes story{

0%{
transform:translateY(100vh) rotate(-10deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(10deg);
opacity:0;
}

}

/* final */

.final{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Great Vibes';
font-size:50px;
color:#d63384;
display:none;
z-index:9999;
padding:20px;
}

/* kalpler */

.heart{
position:absolute;
font-size:30px;
animation:float 4s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-900px);
opacity:0;
}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="muzik.mp3" type="audio/mpeg">
</audio>

<div class="start" id="startScreen">

<h1>Sana bir şey sorabilir miyim?</h1>

<button onclick="startSite()">Evet</button>
<button onclick="startSite()">Hayır</button>

</div>

<div class="container" id="mainSite">

<h2>Barışalım mı? 🤍</h2>

<button id="yes">Evet</button>
<button id="no">Hayır</button>

</div>

<div class="final" id="finalText">
Biliyodum barışacağını zaten 🤍
</div>

<script>

let music=document.getElementById("music")
let yesBtn=document.getElementById("yes")
let noBtn=document.getElementById("no")
let finalText=document.getElementById("finalText")

let grow=0

function startSite(){

document.getElementById("startScreen").style.display="none"
document.getElementById("mainSite").style.display="block"

music.play()

}

let images=[
"1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg","6.jpeg",
"7.jpeg","8.jpeg","9.jpeg","10.jpeg","11.jpeg","12.jpeg",
"13.jpeg","14.jpeg","15.jpeg","16.jpeg","17.jpeg","18.jpeg"
]

let texts=[
"Bir daha düşün bence 🙂",
"Buna da mı hayır diyeceksin?",
"Bak ne kadar tatlıyız 🤍",
"Tam emin misin?",
"Bence evet daha mantıklı",
"Hayır demek zorunda mısın ki",
"Bir şans daha ver bence",
"Bu fotoğrafa da mı hayır?"
]

function moveNo(){

let x=Math.random()*(window.innerWidth-100)
let y=Math.random()*(window.innerHeight-100)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

noBtn.addEventListener("touchstart",moveNo)
noBtn.addEventListener("mouseover",moveNo)

noBtn.onclick=()=>{

grow+=20
yesBtn.style.fontSize=(18+grow)+"px"

showPhoto()

}

function showPhoto(){

let img=images[Math.floor(Math.random()*images.length)]
let text=texts[Math.floor(Math.random()*texts.length)]

let div=document.createElement("div")
div.className="photo"

div.style.left=Math.random()*80+"%"

div.innerHTML=`
<img src="${img}">
<div class="caption">${text}</div>
`

document.body.appendChild(div)

}

yesBtn.onclick=()=>{

document.getElementById("mainSite").style.display="none"

finalText.style.display="block"

startHearts()

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.bottom="-50px"

document.body.appendChild(heart)

},200)

}

</script>

</body>
</html>
