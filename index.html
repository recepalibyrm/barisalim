<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bir şey soracağım 🤍</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#ffd6e7,#ffeaf3);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .screen{
      width:100%;
      padding:20px;
      position:relative;
      z-index:20;
    }

    .start h1,
    .main h2{
      font-family:'Great Vibes',cursive;
      color:#d63384;
      margin:0 0 18px;
      line-height:1.1;
      text-shadow:0 2px 10px rgba(255,255,255,.35);
    }

    .start h1{
      font-size:44px;
      min-height:58px;
    }

    .main h2{
      font-size:48px;
      padding:0 10px;
    }

    .start-buttons{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .start-btn,
    #yes,
    #no{
      border:none;
      border-radius:16px;
      padding:12px 20px;
      font-size:17px;
      font-weight:600;
      color:#fff;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.14);
      touch-action:manipulation;
      white-space:nowrap;
    }

    .start-yes,
    #yes{
      background:#28a745;
    }

    .start-no,
    #no{
      background:#dc3545;
    }

    .main{
      display:none;
    }

    .buttons-layer{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:10000;
      display:none;
    }

    #yes,
    #no{
      position:fixed;
      pointer-events:auto;
      max-width:none;
      min-width:92px;
    }

    #yes{
      left:50%;
      bottom:78px;
      transform:translateX(calc(-100% - 10px));
      transition:left .18s ease, top .18s ease, transform .18s ease;
    }

    #no{
      left:50%;
      bottom:78px;
      transform:translateX(10px);
      transition:left .18s ease, top .18s ease, transform .18s ease;
    }

    .photo{
      position:fixed;
      width:112px;
      background:#fff;
      padding:6px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
      z-index:2;
      animation:photoPop .35s ease;
      overflow:hidden;
    }

    .photo img{
      display:block;
      width:100%;
      height:auto;
      border-radius:6px;
    }

    .caption{
      font-size:10px;
      color:#444;
      margin-top:5px;
      text-align:center;
    }

    @keyframes photoPop{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    .fade-bg{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(2px);
      display:none;
      z-index:99990;
    }

    .final{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(88vw,520px);
      padding:24px 20px;
      border-radius:24px;
      background:rgba(0,0,0,.84);
      color:#fff;
      font-family:'Great Vibes',cursive;
      font-size:40px;
      line-height:1.2;
      box-shadow:0 14px 34px rgba(0,0,0,.35);
      display:none;
      z-index:99999;
      text-align:center;
    }

    .heart{
      position:fixed;
      bottom:-20px;
      font-size:24px;
      z-index:99998;
      pointer-events:none;
      animation:floatUp 3.8s linear forwards;
    }

    @keyframes floatUp{
      from{
        transform:translateY(0) scale(1);
        opacity:1;
      }
      to{
        transform:translateY(-85vh) scale(1.7);
        opacity:0;
      }
    }

    @media (min-width:700px){
      .start h1{ font-size:62px; min-height:74px; }
      .main h2{ font-size:68px; }
      .start-btn, #yes, #no{
        font-size:19px;
        padding:14px 24px;
      }
      .photo{ width:132px; }
      .final{ font-size:48px; }
    }
  </style>
</head>
<body>

  <audio id="music" loop>
    <source src="muzik.mp3" type="audio/mpeg">
  </audio>

  <div class="fade-bg" id="fadeBg"></div>

  <div class="screen start" id="startScreen">
    <h1 id="typeText"></h1>
    <div class="start-buttons">
      <button class="start-btn start-yes" onclick="startSite()">Evet</button>
      <button class="start-btn start-no" onclick="startSite()">Sorucam kaçarın yok</button>
    </div>
  </div>

  <div class="screen main" id="mainSite">
    <h2>Barışalım mı? 🤍</h2>
  </div>

  <div class="buttons-layer" id="buttonsLayer">
    <button id="yes">Evet</button>
    <button id="no">Hayır</button>
  </div>

  <div class="final" id="finalText">Biliyodum barışacağını zaten 🤍</div>

  <script>
    const music = document.getElementById("music");
    const startScreen = document.getElementById("startScreen");
    const mainSite = document.getElementById("mainSite");
    const buttonsLayer = document.getElementById("buttonsLayer");
    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");
    const finalText = document.getElementById("finalText");
    const fadeBg = document.getElementById("fadeBg");
    const typeText = document.getElementById("typeText");

    let noCount = 0;
    let photosShown = [];
    let heartInterval = null;
    let started = false;

    const images = [
      "1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg","6.jpeg",
      "7.jpeg","8.jpeg","9.jpeg","10.jpeg","11.jpeg","12.jpeg",
      "13.jpeg","14.jpeg","15.jpeg"];

    const texts = [
      "Bir daha düşün bence 🙂",
      "Buna da mı hayır diyeceksin?",
      "Bak ne kadar tatlıyız 🤍",
      "Tam emin misin?",
      "Bence evet daha mantıklı",
      "Hayır demek zorunda mısın ki",
      "Bir şans daha ver bence",
      "Bu fotoğrafa da mı hayır?"
    ];

    function startSite(){
      if(started) return;
      started = true;

      startScreen.style.display = "none";
      mainSite.style.display = "block";
      buttonsLayer.style.display = "block";

      resetButtons();
      music.play().catch(() => {});
    }

    function resetButtons(){
      noCount = 0;

      yesBtn.style.fontSize = "";
      yesBtn.style.padding = "";
      yesBtn.style.left = "50%";
      yesBtn.style.top = "";
      yesBtn.style.bottom = "78px";
      yesBtn.style.transform = "translateX(calc(-100% - 10px))";
      yesBtn.style.display = "inline-block";

      noBtn.style.left = "50%";
      noBtn.style.top = "";
      noBtn.style.bottom = "78px";
      noBtn.style.transform = "translateX(10px)";
      noBtn.style.display = "inline-block";
    }

    const typingSentence = "Sana bir şey sorabilir miyim?";
    let typeIndex = 0;

    function typeWriter(){
      if(typeIndex < typingSentence.length){
        typeText.innerHTML += typingSentence.charAt(typeIndex);
        typeIndex++;
        setTimeout(typeWriter, 60);
      }
    }
    typeWriter();

    function randomFrom(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function moveNoButton(){
      noBtn.style.transform = "none";
      noBtn.style.bottom = "auto";

      const btnW = noBtn.offsetWidth || 90;
      const btnH = noBtn.offsetHeight || 46;

      const margin = 14;
      const topSafe = 89;
      const bottomSafe = 89;

      const minX = margin;
      const maxX = Math.max(margin, window.innerWidth - btnW - margin);

      const minY = topSafe;
      const maxY = Math.max(topSafe, window.innerHeight - btnH - bottomSafe);

      const x = Math.random() * (maxX - minX) + minX;
      const y = Math.random() * (maxY - minY) + minY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    function resizeYesButton(){
      const fontSize = Math.min(17 + noCount * 4, 34);
      const padY = Math.min(12 + noCount * 0.8, 20);
      const padX = Math.min(20 + noCount * 1.8, 34);

      yesBtn.style.fontSize = fontSize + "px";
      yesBtn.style.padding = padY + "px " + padX + "px";
    }

    function showPhoto(){
      const card = document.createElement("div");
      card.className = "photo";

      const img = randomFrom(images);
      const text = randomFrom(texts);

      const cardWidth = window.innerWidth >= 700 ? 132 : 112;
      const estimatedHeight = cardWidth * 1.45;

      const xMargin = 10;
      const yTop = 56;
      const yBottomReserve = 130;

      const x = Math.random() * Math.max(10, (window.innerWidth - cardWidth - xMargin * 2)) + xMargin;
      const y = Math.random() * Math.max(10, (window.innerHeight - estimatedHeight - yTop - yBottomReserve)) + yTop;
      const rotate = Math.random() * 28 - 14;

      card.style.left = x + "px";
      card.style.top = y + "px";
      card.style.transform = `rotate(${rotate}deg)`;

      card.innerHTML = `
        <img src="${img}" alt="">
        <div class="caption">${text}</div>
      `;

      document.body.appendChild(card);
      photosShown.push(card);
    }

    noBtn.addEventListener("click", () => {
      noCount++;
      resizeYesButton();
      showPhoto();
      moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
      yesBtn.style.display = "none";
      noBtn.style.display = "none";
      mainSite.style.display = "none";
      fadeBg.style.display = "block";

      arrangePhotosAsHeart();
      startHearts();

      setTimeout(() => {
        finalText.style.display = "block";
      }, 350);
    });

    function arrangePhotosAsHeart(){
      if(photosShown.length === 0){
        showPhoto();
        showPhoto();
        showPhoto();
        showPhoto();
      }

      const count = photosShown.length;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2 + 10;
      const scale = Math.min(window.innerWidth, window.innerHeight) * 0.017;

      photosShown.forEach((photo, index) => {
        const t = (Math.PI * 2 * index) / count;
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

        const px = centerX + hx * scale - photo.offsetWidth / 2;
        const py = centerY + hy * scale - photo.offsetHeight / 2;

        photo.style.transition = "left .9s ease, top .9s ease, transform .9s ease";
        photo.style.left = px + "px";
        photo.style.top = py + "px";
        photo.style.transform = `rotate(${Math.random() * 14 - 7}deg)`;
        photo.style.zIndex = "99991";
      });
    }

    function startHearts(){
      if(heartInterval) return;

      heartInterval = setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 3800);
      }, 170);
    }

    window.addEventListener("resize", () => {
      if(finalText.style.display === "block"){
        arrangePhotosAsHeart();
      } else if(started){
        const rect = noBtn.getBoundingClientRect();
        if(rect.right > window.innerWidth || rect.bottom > window.innerHeight || rect.left < 0 || rect.top < 0){
          moveNoButton();
        }
      }
    });
  </script>
</body>
</html>
